name: 'Setup GO with cache'
description: 'Setup GO and configure modules cache'
inputs:
  go-version:
    description: 'GO version'
    required: true

runs:
  using: 'composite'
  steps:
    - name: 🔧 Install Go ${{ inputs.go-version }}
      uses: actions/setup-go@v6
      with:
        cache: true
        go-version: ${{ inputs.go-version }}

    - name: 🗂️ GO modules cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
          "C:\\Users\\runneradmin\\go\\pkg\\mod"
        key: ${{ runner.os }}-go-${{ inputs.go-version }}-${{ hashFiles(format('./go.mod')) }}
        restore-keys: ${{ runner.os }}-go
