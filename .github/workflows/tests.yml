name: "Tests & Benchmarks"

concurrency:
  group: tests-${{ github.ref_name }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - '*.txt'
      - '*.md'

env:
  GO_VERSION: "1.24.2"

jobs:
  prepare:
    name: "🔧 Prepare"
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/tidy-all-and-generate

      - name: 📦 Upload source
        uses: actions/upload-artifact@v4
        with:
          name: src-gen
          path: .

  test:
    name: "🧪 Test [${{ matrix.os }}]"
    needs: [ prepare ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📥 Download source
        uses: actions/download-artifact@v4
        with:
          name: src-gen
          path: .

      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/run-tests
